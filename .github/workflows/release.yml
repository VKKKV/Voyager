name: Android Release and Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v1.0.2"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: android-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Signed APKs and Publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            git fetch --tags --force
            git checkout "$tag"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          case "$tag" in
            v[0-9]*)
              ;;
            *)
              echo "::error::Release tag must start with v followed by a version number."
              exit 1
              ;;
          esac

          version_name="$(sed -nE 's/[[:space:]]*versionName = "([^"]+)"/\1/p' app/build.gradle.kts | head -n 1)"
          version_code="$(sed -nE 's/[[:space:]]*versionCode = ([0-9]+)/\1/p' app/build.gradle.kts | head -n 1)"

          if [ "$tag" != "v${version_name}" ]; then
            echo "::error::Tag $tag does not match Gradle versionName $version_name."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate release signing secrets
        run: |
          set -euo pipefail
          missing=0
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required GitHub Actions secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Decode release keystore
        run: |
          set -euo pipefail
          keystore_path="$RUNNER_TEMP/voyager-release.keystore"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Run unit tests, lint, and signed release build
        run: ./gradlew testDebugUnitTest lintDebug assembleRelease --stacktrace

      - name: Prepare GitHub Pages release site
        run: scripts/prepare-github-pages-release.sh "${{ steps.release.outputs.tag }}" app/build/outputs/apk/release public

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" public/downloads/* --clobber
          else
            gh release create "$RELEASE_TAG" public/downloads/* \
              --title "Voyager $RELEASE_TAG" \
              --generate-notes \
              --verify-tag
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v5
